<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#081220"/>
  <!-- Upper-left S-bolt blade -->
  <path d="M11.2 0.8 L0.8 5.6 L5.6 15.2 L17.6 9.6 Z" fill="#D4A373"/>
  <!-- Lower-right S-bolt blade -->
  <path d="M20.8 31.2 L31.2 26.4 L26.4 16.8 L14.4 22.4 Z" fill="#D4A373"/>
  <!-- Outer metallic ring -->
  <circle cx="16" cy="16" r="9.5" stroke="rgba(200,218,232,.6)" stroke-width="2" fill="rgba(8,18,32,.5)"/>
  <!-- Highlight arc -->
  <path d="M22.7 9.3 A9.5 9.5 0 0 1 25.5 16" stroke="rgba(255,255,255,.85)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="6" stroke="rgba(226,232,240,.88)" stroke-width="1.5" fill="none"/>
  <!-- Crosshair ticks between rings -->
  <line x1="16" y1="6.5"  x2="16" y2="9.5"  stroke="rgba(226,232,240,.92)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="22.5" x2="16" y2="25.5" stroke="rgba(226,232,240,.92)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6.5"  y1="16" x2="9.5"  y2="16" stroke="rgba(226,232,240,.92)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="22.5" y1="16" x2="25.5" y2="16" stroke="rgba(226,232,240,.92)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3"   fill="#D4A373"/>
  <circle cx="16" cy="16" r="1.5" fill="#E6C200"/>
</svg>
